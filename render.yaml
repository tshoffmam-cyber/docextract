services:
  - type: web
    name: docextract-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: docextract-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: docextract-redis
          type: redis
          property: connectionString
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      - key: R2_PUBLIC_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE_HOURS
        value: "24"
      - key: FRONTEND_URL
        sync: false
      - key: MAX_PDF_PAGES
        value: "50"
      - key: BATCH_SIZE
        value: "15"
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false

  - type: worker
    name: docextract-worker
    runtime: docker
    dockerfilePath: ./Dockerfile
    startCommand: celery -A app.workers.celery_app worker --loglevel=info --concurrency=2
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: docextract-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: docextract-redis
          type: redis
          property: connectionString
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      - key: R2_PUBLIC_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: MAX_PDF_PAGES
        value: "50"
      - key: BATCH_SIZE
        value: "15"

  - type: redis
    name: docextract-redis
    plan: free
    maxmemoryPolicy: noeviction

databases:
  - name: docextract-db
    plan: free
    databaseName: docextract
    user: docextract
